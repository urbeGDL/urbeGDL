<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete a nuestra causa - UrbeGDL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="unete.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="unete-container">   
        <div class="unete-box">
            <img src="imagenes/logo.png" alt="Logo" class="logo-unete">
            <h1>Únete a nuestra causa</h1>
            <p class="subtitle">Colabora con UrbeGDL</p>
            
            <div id="registerError" class="error-message" style="display:none;"></div>
            <div id="registerSuccess" class="success-message" style="display:none;"></div>
            
            <form onsubmit="registrarUsuario(event)">
                <div class="input-group">
                    <label for="nombre">Nombre de Usuario</label>
                    <input type="text" id="nombre" placeholder="Juan123" required minlength="3">
                </div>
                
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                
                <div class="input-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn-unete-submit" id="btnRegister">Registrarse</button>
            </form>
            
            <p class="back-link"><a href="index.html">← Volver al inicio</a></p>
            <p class="login-link">¿Ya tienes cuenta? <a href="login.html">Ingresa aquí</a></p>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5hGd8vsY60T0BAuq8RAIx5TpzWNbXThk",
            authDomain: "urbegdl-9d9f0.firebaseapp.com",
            projectId: "urbegdl-9d9f0",
            storageBucket: "urbegdl-9d9f0.firebasestorage.app",
            messagingSenderId: "698422088985",
            appId: "1:698422088985:web:7187a9baca0d279a8ca188",
            databaseURL: "https://urbegdl-9d9f0-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        
        function showError(msg) {
            const el = document.getElementById('registerError');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('registerSuccess').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('registerSuccess');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('registerError').style.display = 'none';
        }
        
        function registrarUsuario(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('btnRegister');
            
            if (password !== confirmPassword) {
                showError('Las contraseñas no coinciden');
                return;
            }
            
            if (password.length < 6) {
                showError('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Registrando...';
            
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    user.updateProfile({ displayName: nombre }).then(() => {
                        firebase.database().ref('usuarios/' + user.uid).set({
                            nombre: nombre,
                            email: email,
                            fechaRegistro: new Date().toLocaleString('es-MX')
                        }).then(() => {
                            showSuccess('✅ ¡Registro exitoso! Redireccionando...');
                            setTimeout(() => window.location.href = 'index.html', 1500);
                        });
                    });
                })
                .catch((error) => {
                    showError('Error: ' + error.message);
                    btn.disabled = false;
                    btn.textContent = 'Registrarse';
                });
        }
        
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
