<body>
    <div class="unete-container">   
        <div class="unete-box">
            <img src="imagenes/logo.png" alt="Logo" class="logo-unete">
            <h1>Únete a nuestra causa</h1>
            <p class="subtitle">Colabora con UrbeGDL</p>
            
            <button class="btn-google" onclick="loginConGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" class="google-icon">
                Continuar con Google
            </button>
            
            <div class="divider">
                <span>o regístrate con email</span>
            </div>
            
            <form onsubmit="registrarUsuario(event)">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <button type="submit" class="btn-unete-submit">Crear Cuenta</button>
            </form>
            
            <div class="whatsapp-section">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
            
            <a href="https://whatsapp.com/channel/0029VbCz1kgKGGGEMucdhS2s" target="_blank" class="btn-whatsapp">
                <svg viewBox="0 0 24 24" class="whatsapp-icon">

            <p class="back-link"><a href="index.html">← Volver al inicio</a></p>
        </div>
    </div>
    
    <script>
        function loginConGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    firebase.database().ref('usuarios/' + user.uid).set({
                        nombre: user.displayName,
                        email: user.email,
                        foto: user.photoURL,
                        fechaRegistro: new Date().toLocaleString('es-MX')
                    }, function(error) {
                        if (error) {
                            console.error('Error guardando usuario:', error);
                        }
                        window.location.href = 'index.html';
                    });
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    alert('Error al registrarse: ' + error.message);
                });
        }
        
        function registrarUsuario(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Por favor completa todos los campos');
                return;
            }
            
            if (password.length < 6) {
                alert('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(result) {
                    const user = result.user;
                    firebase.database().ref('usuarios/' + user.uid).set({
                        email: email,
                        fechaRegistro: new Date().toLocaleString('es-MX')
                    }, function(error) {
                        if (error) {
                            console.error('Error guardando datos:', error);
                        }
                        window.location.href = 'index.html';
                    });
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    if (error.code === 'auth/email-already-in-use') {
                        alert('Este correo ya está registrado. Inicia sesión en su lugar.');
                    } else {
                        alert('Error al registrarse: ' + error.message);
                    }
                });
        }
    </script>
</body>
</html>
