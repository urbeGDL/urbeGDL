<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete a nuestra causa - UrbeGDL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="unete.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5hGd8vsY60T0BAuq8RAIx5TpzWNbXThk",
            authDomain: "urbegdl-9d9f0.firebaseapp.com",
            projectId: "urbegdl-9d9f0",
            storageBucket: "urbegdl-9d9f0.firebasestorage.app",
            messagingSenderId: "698422088985",
            appId: "1:698422088985:web:7187a9baca0d279a8ca188",
            databaseURL: "https://urbegdl-9d9f0-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <div class="unete-container">   
        <div class="unete-box">
            <img src="imagenes/logo.png" alt="Logo" class="logo-unete">
            <h1>Únete a nuestra causa</h1>
            <p class="subtitle">Colabora con UrbeGDL</p>
            
            <button class="btn-google" onclick="loginConGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" class="google-icon">
                Continuar con Google
            </button>
            
            <div class="divider">
                <span>o regístrate con email</span>
            </div>
            
            <form onsubmit="registrarUsuario(event)">
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Juan Pérez García" required>
                </div>
                
                <div class="input-group">
                    <label for="nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="nacimiento" required>
                </div>
                
                <div class="input-group">
                    <label for="curp">CURP</label>
                    <input type="text" id="curp" placeholder="AAAA000000HGRRRR01" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <div class="input-group">
                    <label for="telefono">Número de Teléfono</label>
                    <input type="tel" id="telefono" placeholder="33 1234 5678" required>
                </div>
                
                <button type="submit" class="btn-unete-submit">Registrarse</button>
            </form>
            
            <p class="back-link"><a href="index.html">← Volver al inicio</a></p>
        </div>
    </div>
    
    <script>
        function loginConGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    firebase.database().ref('usuarios/' + user.uid).set({
                        nombre: user.displayName,
                        email: user.email,
                        foto: user.photoURL,
                        fechaRegistro: new Date().toLocaleString('es-MX')
                    }, function(error) {
                        if (error) {
                            console.error('Error guardando usuario:', error);
                        }
                        window.location.href = 'index.html';
                    });
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    alert('Error al registrarse: ' + error.message);
                });
        }
        
        function registrarUsuario(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const nacimiento = document.getElementById('nacimiento').value;
            const curp = document.getElementById('curp').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password')?.value;
            
            if (!nombre || !email || !telefono || !password) {
                alert('Por favor completa todos los campos obligatorios');
                return;
            }
            
            if (password.length < 6) {
                alert('La contraseña debe tener al menos 6 caracteres');
                return;
            }
            
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(result) {
                    const user = result.user;
                    // Guardar datos adicionales en la base de datos
                    firebase.database().ref('usuarios/' + user.uid).set({
                        nombre: nombre,
                        nacimiento: nacimiento,
                        curp: curp,
                        email: email,
                        telefono: telefono,
                        foto: null,
                        fechaRegistro: new Date().toLocaleString('es-MX')
                    }, function(error) {
                        if (error) {
                            console.error('Error guardando datos:', error);
                        }
                        window.location.href = 'index.html';
                    });
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    if (error.code === 'auth/email-already-in-use') {
                        alert('Este correo ya está registrado. Inicia sesión en su lugar.');
                    } else {
                        alert('Error al registrarse: ' + error.message);
                    }
                });
        }
    </script>
</body>
</html>
