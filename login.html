<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UrbeGDL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="imagenes/logo.png" alt="Logo" class="logo-login">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">UrbeGDL</p>
            
            <form onsubmit="iniciarSesion(event)">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="telefono">Número de Teléfono</label>
                    <input type="tel" id="telefono" placeholder="33 1234 5678" required>
                </div>
                
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            
            <p class="register-link">¿No tienes cuenta? <a href="unete.html">Regístrate</a></p>
        </div>
    </div>
</body>
</html>
