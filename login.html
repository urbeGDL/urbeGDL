<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UrbeGDL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5hGd8vsY60T0BAuq8RAIx5TpzWNbXThk",
            authDomain: "urbegdl-9d9f0.firebaseapp.com",
            projectId: "urbegdl-9d9f0",
            storageBucket: "urbegdl-9d9f0.firebasestorage.app",
            messagingSenderId: "698422088985",
            appId: "1:698422088985:web:7187a9baca0d279a8ca188",
            databaseURL: "https://urbegdl-9d9f0-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="imagenes/logo.png" alt="Logo" class="logo-login">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">UrbeGDL</p>
            
            <button class="btn-google" onclick="loginConGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" class="google-icon">
                Continuar con Google
            </button>
            
            <div class="divider">
                <span>o</span>
            </div>
            
<form onsubmit="iniciarSesion(event)">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            
            <p class="register-link">¿No tienes cuenta? <a href="unete.html">Regístrate</a></p>
        </div>
    </div>
    
    <script>
        function loginConGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then(function(result) {
                    window.location.href = 'index.html';
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    alert('Error al iniciar sesión: ' + error.message);
                });
        }
        
        function iniciarSesion(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Por favor completa todos los campos');
                return;
            }
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(function(result) {
                    window.location.href = 'index.html';
                })
                .catch(function(error) {
                    console.error('Error:', error);
                    if (error.code === 'auth/user-not-found') {
                        if (confirm('No existe una cuenta con este correo. ¿Deseas registrarte?')) {
                            window.location.href = 'unete.html';
                        }
                    } else if (error.code === 'auth/wrong-password') {
                        alert('Contraseña incorrecta');
                    } else {
                        alert('Error: ' + error.message);
                    }
                });
        }
    </script>
</body>
</html>
