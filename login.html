<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - UrbeGDL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="imagenes/logo.png" alt="Logo" class="logo-login">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">UrbeGDL</p>
            
            <div id="loginError" class="error-message" style="display:none;"></div>
            <div id="loginSuccess" class="success-message" style="display:none;"></div>
            
            <form onsubmit="loginEmail(event)">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" class="btn-login" id="btnLogin">Ingresar</button>
            </form>
            
            <div class="divider"><span>o</span></div>
            
            <button type="button" class="btn-google" onclick="loginGoogle()">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.96 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 6.45 1.18 7.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.96 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continuar con Google
            </button>
            
            <p class="register-link">¿No tienes cuenta? <a href="unete.html">Regístrate</a></p>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5hGd8vsY60T0BAuq8RAIx5TpzWNbXThk",
            authDomain: "urbegdl-9d9f0.firebaseapp.com",
            projectId: "urbegdl-9d9f0",
            storageBucket: "urbegdl-9d9f0.firebasestorage.app",
            messagingSenderId: "698422088985",
            appId: "1:698422088985:web:7187a9baca0d279a8ca188",
            databaseURL: "https://urbegdl-9d9f0-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        
        const ADMIN_EMAIL = 'urbegdl@gmail.com';
        
        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('loginSuccess').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('loginSuccess');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('loginError').style.display = 'none';
        }
        
        function loginEmail(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            
            btn.disabled = true;
            btn.textContent = 'Ingresando...';
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    showSuccess('✅ ¡Bienvenido! Redireccionando...');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                })
                .catch((error) => {
                    showError('Error: ' + error.message);
                    btn.disabled = false;
                    btn.textContent = 'Ingresando';
                });
        }
        
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    showSuccess('✅ ¡Bienvenido! Redireccionando...');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                })
                .catch((error) => {
                    showError('Error: ' + error.message);
                });
        }
        
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
